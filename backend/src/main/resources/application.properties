spring.application.name=backend

# =================================================================
#  DATASOURCE — Neon PostgreSQL Cloud
#  Điền 3 giá trị bên dưới từ Neon Dashboard > Connection Details
# =================================================================
spring.datasource.url=jdbc:postgresql://ep-bold-unit-amd1epkd-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_m2bhA6IcDMnw
spring.datasource.driver-class-name=org.postgresql.Driver

# =================================================================
#  CONNECTION POOL — HikariCP
#  Tối ưu cho Neon serverless (cold start chậm hơn localhost)
# =================================================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# =================================================================
#  JPA / HIBERNATE
#  validate = kiểm tra Entity khớp với bảng Neon, không tự tạo bảng
# =================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =================================================================
#  SERVER
# =================================================================
server.port=8080

